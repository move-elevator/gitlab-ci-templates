# Purpose:
#   Test a feature branch instance with jetbrains http tests
#
test:feature:http:
  stage: test
  image: jetbrains/intellij-http-client
  needs:
    - deploy:feature
  rules:
    - if: $CI_COMMIT_TAG || $CI_PIPELINE_SOURCE == "schedule" || $CI_PIPELINE_SOURCE == "pipeline" || $CI_PIPELINE_SOURCE == "merge_request_event"
      when: never
    - if: $CI_COMMIT_REF_NAME =~ /^(main|feature-.*|[A-Z]{2,}-\d+-.*)$/
  variables:
    HTTP_TEST_DIR: tests/http
    HTTP_ENV_FILE: http-client.env.json
    HTTP_ENV: staging
    HTTP_BASE_PATH: _api
    HTTP_BASE_URL: https://$DOMAIN_STAGE/$CI_COMMIT_REF_NAME/
  script:
    - echo -e "\e[33mRunning http tests on $HTTP_BASE_URL$HTTP_BASE_PATH\e[0m"
    - |
      for file in ${HTTP_TEST_DIR}/*.http; do
        ijhttp "$file" \
          --env="${HTTP_ENV}" \
          --env-file="${HTTP_ENV_FILE}" \
          --insecure \
          --env-variables "host=${HTTP_BASE_URL}${HTTP_BASE_PATH}"
      done

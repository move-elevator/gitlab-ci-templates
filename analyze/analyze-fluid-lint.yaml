# Purpose:
#   Analyze job for linting all fluid files
#
# Dependency:
#   Composer package "typo3/cms-fluid" and a composer script "lint:fluid"
#
analyze:fluid:lint:
  image:
    name: ${DEFAULT_IMAGE_BUILD_COMPOSER}
  stage: analyze
  needs:
    - build:php
  script:
    - composer run lint:fluid
  rules:
    - if: $CI_PIPELINE_SOURCE == "web"
      when: always
    - if: $CI_COMMIT_TAG || $CI_PIPELINE_SOURCE == "schedule" || $CI_PIPELINE_SOURCE == "pipeline" || $CI_PIPELINE_SOURCE == "merge_request_event"
      when: never
    - if: $CI_COMMIT_TAG == null
      changes:
        - "**/*.fluid.html"
